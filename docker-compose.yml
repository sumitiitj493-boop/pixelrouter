services:

  upload-service:
    build:
      context: ./upload-service
    container_name: upload-service
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOAD_BALANCER_URL=http://load-balancer:8001
    depends_on:
      redis:
        condition: service_healthy
      load-balancer:
        condition: service_healthy
    networks:
      - pixelrouter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  load-balancer:
    build:
      context: ./load-balancer
    container_name: load-balancer
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PROCESSOR_URLS=http://processor-1:8002,http://processor-2:8003
      - MAX_CPU_THRESHOLD=80
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pixelrouter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  processor-1:
    build:
      context: ./processor
    container_name: processor-1
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PROCESSOR_ID=processor-1
      - PORT=8002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pixelrouter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  processor-2:
    build:
      context: ./processor
    container_name: processor-2
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PROCESSOR_ID=processor-2
      - PORT=8003
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pixelrouter-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pixelrouter-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - pixelrouter-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  pixelrouter-network:
    driver: bridge

volumes:
  redis-data:
